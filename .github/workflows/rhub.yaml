# Simplified R-hub GitHub Actions workflow
# Based on the canonical R-hub workflow:
# https://github.com/r-hub/actions/blob/v1/workflows/rhub.yaml

name: R-hub
run-name: >-
  ${{ github.event.inputs.id || format('Manual run by @{0}', github.triggering_actor) }}:
  ${{ github.event.inputs.name || github.event.inputs.config }}

on:
  workflow_dispatch:
    inputs:
      config:
        description: "Comma-separated list of R-hub platforms to use."
        type: string
        default: "linux,windows,macos"
      name:
        description: "Run name. You can leave this empty."
        type: string
      id:
        description: "Unique ID. You can leave this empty."
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      platforms: ${{ steps.rhub-setup.outputs.platforms }}

    steps:
      - uses: r-hub/actions/setup@v1
        id: rhub-setup
        with:
          config: ${{ github.event.inputs.config }}

  other-platforms:
    needs: setup
    if: ${{ needs.setup.outputs.platforms != '[]' }}
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.label }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.platforms) }}

    steps:
      - uses: r-hub/actions/checkout@v1

      - uses: r-hub/actions/setup-r@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}

      - uses: r-hub/actions/platform-info@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}

      - uses: r-hub/actions/setup-deps@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}

      - uses: r-hub/actions/run-check@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}